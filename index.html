<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Basalraten-Rechner Pro</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body { font-family: sans-serif; background: #121212; color: #fff; display: flex; flex-direction: column; align-items: center; padding: 20px; }
        .card { background: #1e1e1e; padding: 20px; border-radius: 12px; width: 100%; max-width: 500px; border: 1px solid #333; }
        input, select { width: 100%; padding: 12px; margin: 10px 0; background: #000; color: #fff; border: 1px solid #444; border-radius: 8px; box-sizing: border-box; }
        button { width: 100%; background: #3498db; color: white; border: none; padding: 15px; border-radius: 8px; font-weight: bold; cursor: pointer; }
        .chart-box { width: 100%; max-width: 600px; height: 300px; margin-top: 20px; display: none; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { padding: 8px; border-bottom: 1px solid #333; text-align: left; }
    </style>
</head>
<body>
    <div class="card">
        <h2>Basal-Rechner</h2>
        <label>Gesamt-Insulin (TDD):</label>
        <input type="number" id="tdd" step="0.1">
        <label>Alter:</label>
        <select id="ageGroup">
            <option value="0-6">0-6 Jahre</option>
            <option value="6-12">6-12 Jahre</option>
            <option value="12-18+">12-18+ Jahre</option>
        </select>
        <label>Basalanteil (%):</label>
        <input type="number" id="basalPercent" value="35" min="30" max="40">
        <button onclick="calc()">Berechnen</button>
    </div>

    <div id="chartBox" class="chart-box"><canvas id="myChart"></canvas></div>
    <div id="resultTable" style="display:none; width:100%; max-width:500px;">
        <table id="tbl"><thead><tr><th>Uhrzeit</th><th>IE/h</th></tr></thead><tbody></tbody></table>
    </div>

<script>
    let chart;
    const data = {
        "0-6": [4, 3.6, 3.4, 3.7, 3.8, 3.9, 4.2, 4, 3.7, 3.5, 3.1, 2.8, 2.9, 3.2, 3.6, 4, 4.5, 5, 5.1, 5.5, 5.8, 6.1, 5.5, 5.1],
        "6-12": [4.2, 4.3, 4.4, 4.7, 4.9, 5, 5, 4.5, 3.9, 3.3, 3.1, 2.9, 2.9, 3, 3.3, 3.9, 4.5, 4.8, 4.7, 4.7, 4.7, 4.5, 4.5, 4.3],
        "12-18+": [3.4, 3.8, 4.3, 5, 5.6, 6.1, 5.9, 5.1, 4.3, 3.8, 3.5, 3.4, 3.3, 3.4, 3.7, 4, 4.6, 4.6, 4.5, 4, 3.7, 3.4, 3.3, 3.3]
    };

    function calc() {
        const tdd = document.getElementById('tdd').value;
        const perc = document.getElementById('basalPercent').value;
        const age = document.getElementById('ageGroup').value;
        if(!tdd) return alert("TDD fehlt!");

        const totalBasal = tdd * (perc / 100);
        const rates = data[age].map(p => {
            let val = (tdd * 0.35) * (p/100) * (perc/35);
            return Math.round(val * 40) / 40; // Rundung 0.025
        });

        document.getElementById('chartBox').style.display = 'block';
        document.getElementById('resultTable').style.display = 'block';

        const tbody = document.querySelector('#tbl tbody');
        tbody.innerHTML = rates.map((r, i) => `<tr><td>${i}:00-${i+1}:00</td><td>${r.toFixed(3)}</td></tr>`).join('');

        const ctx = document.getElementById('myChart').getContext('2d');
        if(chart) chart.destroy();
        chart = new Chart(ctx, {
            type: 'line',
            data: {
                labels: Array.from({length: 24}, (_, i) => i),
                datasets: [{ label: 'IE/h', data: rates, stepped: true, borderColor: '#3498db', fill: true, backgroundColor: 'rgba(52,152,219,0.2)' }]
            },
            options: { scales: { y: { beginAtZero: true } } }
        });
    }
</script>
</body>
</html>
